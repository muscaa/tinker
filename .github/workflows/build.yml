name: Build
on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.13'

      - name: Build
        run: python3 -c "from scripts import build; build()"

      - name: Release
        uses: softprops/action-gh-release@v3
        with:
          files: build/tinker-bundle.zip
